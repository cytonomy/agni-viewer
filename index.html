const b = s => Uint8Array.from(atob(s), c => c.charCodeAt(0));
async function unlock(pw){
  const km = await crypto.subtle.importKey('raw', new TextEncoder().encode(pw), 'PBKDF2', false, ['deriveKey']);
  const key = await crypto.subtle.deriveKey(
    {name:'PBKDF2', salt:b(P.salt), iterations:P.iters, hash:'SHA-256'},
    km, {name:'AES-GCM', length:256}, false, ['decrypt']);
  const pt = await crypto.subtle.decrypt({name:'AES-GCM', iv:b(P.iv)}, key, b(P.data));
  return new TextDecoder().decode(pt);
}
document.getElementById('f').addEventListener('submit', async ev => {

  const e = document.getElementById('e'); e.textContent = '';
  document.getElementById('go').textContent = 'Decrypting…';
  try {
    const html = await unlock(document.getElementById('pw').value);
    document.open(); document.write(html); document.close();
  } catch (_) {
    e.textContent = 'Wrong password.';
